name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  vitest:
    name: JS tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22.22"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        working-directory: ./plugins/places

      - name: Run tests
        run: npm test
        working-directory: ./plugins/places
  phpunit:
    name: PHP tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["8.4"]
    services:
      database:
        image: mysql:latest
        env:
          MYSQL_DATABASE: wordpress_tests
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
    steps:
      - name: Check out source code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: phpunit-polyfills:1.1
      - name: Cache and install SVN
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: subversion
          version: 1.0
      - name: Setup tests
        run: bash bin/ci.sh wordpress_tests root root 127.0.0.1 latest true
      - name: Run tests (export-volunteers)
        run: phpunit
        working-directory: ./plugins/export-volunteers
      - name: Run tests (places)
        run: phpunit
        working-directory: ./plugins/places
